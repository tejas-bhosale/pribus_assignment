version: "3.9"

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      HOSPITAL_API_BASE_URL: https://hospital-directory.onrender.com
      MAX_BATCH_SIZE: 20
      MAX_WORKERS: 10
      REQUEST_TIMEOUT: 30
      DEBUG: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/hospitals/bulk/healthcheck/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
